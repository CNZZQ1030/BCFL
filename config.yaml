# 通用配置
blockchain:
  url: "http://127.0.0.1:7545"
  contract_address: "0xe78A0F7E598Cc8b0Bb87894B0F60dD2a88d6a8Ab"
  abi_path: "build/contracts/BCFL.json"

# 服务器配置
server:
  rounds: 3
  clients: 2
  num_epochs: 2
  model_type: "cnn"  # 可选: "cnn", "resnet"
  dataset: "mnist"   # 可选: "mnist", "cifar10"
  strategy: "reputation"  # 可选: "fedavg", "fedprox", "reputation"
  iid: true
  initial_model_path: "ipfs_models/initial_model.pth"

# # 客户端配置
# client:
#   cid: 1  # 客户端 ID，运行多个客户端时需修改
#   attack_type: null  # 可选: "label_flip" 或 null
#   poison_ratio: 0.2